# ============================================================
# Containment Agent Configuration
# Fill in your values below. Lines starting with # are comments.
#
# IMPORTANT — SECRETS MANAGEMENT:
# This file never holds a real credential value. Every field that used to
# be a plaintext secret is now a REFERENCE NAME — a lookup key that the
# agent resolves through whichever secrets backend you configure below
# (Azure Key Vault or KeePass). The real secret only ever lives inside that
# backend. If you paste an actual API key/password into one of those
# fields instead of a reference name, the agent will fail to start with a
# clear "secret not found" error — there is no code path that accepts a
# literal secret here. See vault/resolver.py for the exact list of fields
# this applies to.
# ============================================================

# ------------------------------------------------------------
# SECRETS BACKEND — pick exactly one.
# ------------------------------------------------------------
secrets_provider: "azure_keyvault"   # or "keepass"

secrets_backends:

  azure_keyvault:
    # Base URL of your Key Vault.
    vault_url: "https://your-vault-name.vault.azure.net/"
    # Authentication is handled by DefaultAzureCredential — never a
    # credential in this file. It tries, in order: environment variables
    # (AZURE_CLIENT_ID/AZURE_CLIENT_SECRET/AZURE_TENANT_ID, if you've set up
    # a service principal that way), a Managed Identity (recommended if this
    # agent runs on Azure infrastructure — requires zero stored credentials),
    # or an interactive `az login` session (fine for local development).
    #
    # Setup:
    #   az keyvault create --name your-vault-name --resource-group your-rg
    #   az keyvault secret set --vault-name your-vault-name --name anthropic-api-key --value sk-ant-...
    #   (repeat for each reference name used below)
    # Then grant your agent's identity "Key Vault Secrets User" (get-only).

  keepass:
    # Path to your .kdbx database.
    database_path: "C:/path/to/your/vault.kdbx"
    # Optional — only if your database uses a key file in addition to (or
    # instead of) a master password.
    keyfile_path: null
    #
    # The master password itself is NEVER put in this file (that would just
    # move the hardcoding problem, not solve it). The agent will:
    #   - read it from the KEEPASS_MASTER_PASSWORD environment variable if set
    #     (useful for running the agent unattended/as a service), or
    #   - prompt for it interactively at startup otherwise.
    #
    # Setup: open the database in KeePass, add one entry per credential
    # below, titled with the exact reference name shown in comments (e.g.
    # "anthropic-api-key"), with the real value in that entry's Password field.

# Your Anthropic API key reference name (used for AI alert evaluation).
# Get the real key at: https://console.anthropic.com
# Store it in your vault under this name, then reference it here:
anthropic_api_key: "anthropic-api-key"

# ============================================================
# ALERT SOURCES (multi-source, configurable)
# Each entry defines one incoming alert source and which connector
# handles its response actions (isolate/kill_process/quarantine_file/block_hash).
# The source name becomes the webhook path: POST /webhook/alert/<source name>
#
# You can enable as many sources as you want at once — e.g. Defender for
# Endpoint AND CrowdStrike AND Tanium simultaneously, each posting to its
# own path. `connector` picks which adapter in connectors/ handles it;
# it defaults to the source name if omitted.
# ============================================================

sources:

  defender_endpoint:
    connector: defender   # POST alerts here: /webhook/alert/defender_endpoint

  m365_defender:
    connector: defender   # unified M365 Defender alerts, same Graph-based connector
                          # POST alerts here: /webhook/alert/m365_defender

  crowdstrike:
    connector: crowdstrike   # POST alerts here: /webhook/alert/crowdstrike

  tanium:
    connector: tanium        # POST alerts here: /webhook/alert/tanium

  # generic:
  #   connector: generic     # POST alerts here: /webhook/alert/generic

# ============================================================
# PLATFORM CREDENTIALS
# Fill in credentials only for the platforms you enabled above under `sources`.
# Non-secret fields (base_url, tenant_id, client_id) stay as plain values —
# they're identifiers, not secrets, and aren't exploitable alone. Only the
# fields marked "reference name" below get resolved through your vault.
# ============================================================

platforms:

  defender:
    # Azure AD app registration used for Microsoft Graph Security API calls.
    # Needs Application permissions (admin-consented) for machine isolation,
    # file quarantine, and threat indicator management — see
    # connectors/defender.py for the specific permission names.
    tenant_id: "YOUR_AZURE_TENANT_ID"
    client_id: "YOUR_APP_REGISTRATION_CLIENT_ID"
    client_secret: "defender-client-secret"   # reference name — store the real secret in your vault

  crowdstrike:
    # Client ID is an identifier, not a secret — stays plain.
    client_id: "YOUR_CS_CLIENT_ID"
    client_secret: "crowdstrike-client-secret"   # reference name
    # Your CrowdStrike API base URL (region-specific)
    base_url: "https://api.crowdstrike.com"

  tanium:
    api_token: "tanium-api-token"   # reference name
    # Your Tanium server URL
    base_url: "https://your-tanium-server.example.com"

  generic:
    # For custom platforms: agent will POST to this URL with
    # {"host_id": "...", "action": "isolate"} (and similar payloads for
    # kill_process / quarantine_file / block_hash — see connectors/generic.py)
    isolation_endpoint: "https://your-platform/api/isolate"
    api_key: "generic-connector-api-key"   # reference name
    api_key_header: "Authorization"

# ============================================================
# NOTIFICATIONS
# Both email and Slack will receive the approval request.
# ============================================================

notifications:

  slack:
    # Reference name — the webhook URL itself grants posting capability, so
    # it's treated as a secret. Create the real one at:
    # https://api.slack.com/messaging/webhooks
    webhook_url: "slack-webhook-url"

  email:
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    # Your sending email address — not a secret, stays plain.
    username: "your-email@gmail.com"
    # Reference name. For Gmail, store an App Password (not your real
    # password) under this name in your vault.
    # Create one at: myaccount.google.com/apppasswords
    password: "smtp-password"
    from_address: "your-email@gmail.com"
    # List of recipients (can be more than one)
    to_addresses:
      - "analyst@yourcompany.com"

# ============================================================
# SIEM / AUDIT FORWARDING (optional)
# Forwards a full audit trail of every alert this agent handles — the raw
# alert, Claude's evaluation, and the eventual outcome — to your SIEM.
# Either or both destinations can be enabled at once.
# ============================================================

integrations:
  siem:
    splunk_hec:
      enabled: false
      # Base URL of your Splunk HEC listener (commonly port 8088)
      url: "https://your-splunk-instance.example.com:8088"
      # Reference name. Create the real HEC token at:
      # Settings > Data Inputs > HTTP Event Collector
      token: "splunk-hec-token"
      # Optional — omit to use Splunk's default index
      index: "security"
      sourcetype: "containment_agent"
      # Set to false only if your HEC endpoint uses a self-signed cert
      verify_ssl: true

    generic_webhook:
      enabled: false
      # Any HTTPS endpoint that accepts a JSON POST — QRadar, Sentinel,
      # LogRhythm, Elastic, a syslog-forwarder shim, etc.
      url: "https://your-siem.example.com/api/ingest"
      headers:
        # Each header value here is also a reference name, resolved the
        # same way as the fields above.
        Authorization: "siem-webhook-auth-header"

# ============================================================
# SERVER SETTINGS
# The agent runs a small web server to receive alerts and approvals.
# ============================================================

server:
  host: "0.0.0.0"
  port: 5000
  # Public URL used in approve/deny links.
  # For local testing use localhost.
  # In production, replace with your real server URL or ngrok URL.
  public_url: "http://localhost:5000"

# ============================================================
# AGENT BEHAVIOR
# ============================================================

agent:
  # Minimum AI-assessed severity to send a notification.
  # Options: "low" | "medium" | "high" | "critical"
  # Alerts below this threshold are logged only — no notification sent.
  min_severity_to_notify: "medium"

  # Minutes before a pending approval expires automatically.
  approval_timeout_minutes: 30

  # Log all agent actions to a file
  log_to_file: true
  log_file: "agent.log"
